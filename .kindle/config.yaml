# ============================================================
# config.yaml — Paramètres de l'eBook
# ============================================================

# ── Métadonnées ──────────────────────────────────────────────
title: ""Dépôt Github Paperasse""
author: ""Romain Simon""
language: "fr"                  # Code ISO 639-1 (fr, en, de…)
description: "Sélection de skills et d'agents de Paperasse"

# ── Fichier de sortie ────────────────────────────────────────
# Le nom du fichier généré (sans extension)
output_filename: "paperasse"        # → output/ebook.epub

# ── Identifiant unique de l'eBook ────────────────────────────
# Généré automatiquement au premier build, ne pas modifier ensuite.
# Permet à la liseuse de reconnaître les mises à jour comme une
# révision du même livre plutôt que d'en créer un nouveau.
uuid: "c8a237d7-e42b-4e8f-b9f9-ff8716b0c2dd"

# ── Options de mise en forme ──────────────────────────────────
number_chapters: true      # true → numérotation automatique des titres (1., 1.1., etc.)

# ── Format EPUB ──────────────────────────────────────────────
epub_version: 3                 # 2 ou 3 (3 recommandé, supporté par tous les Kindle récents)

# ── Table des matières ───────────────────────────────────────
toc: true                       # true / false
toc_depth: 2                    # Niveaux de heading inclus dans la TOC (1 à 4)

# ── Coloration syntaxique ────────────────────────────────────
# Styles disponibles : pygments, tango, espresso, zenburn, kate,
#                      monochrome, breezedark, haddock
# → "monochrome" est le plus lisible sur e-ink Kindle
highlight_style: monochrome

# ── Envoi Kindle ─────────────────────────────────────────────
# Adresse @kindle.com de ton appareil
# Paramètres > Mon compte > Appareils et contenu Kindle
kindle_email: "antoine.monconduit_1W6jxc@kindle.com"

# ── Notes de build ───────────────────────────────────────────
# Ces champs sont informatifs, non utilisés par build.sh
version: "1.0"
date: "2026-04-03"
